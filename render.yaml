services:
  - type: web
    name: product-explorer-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /navigation
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: product-explorer-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: PORT
        value: 3001

databases:
  - name: product-explorer-db
    plan: free

